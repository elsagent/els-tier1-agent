name: Weekly persona eval

on:
  # Every Monday 06:00 UTC (02:00 ET). Adjust cron as needed.
  schedule:
    - cron: '0 6 * * 1'
  # Manual runs from the Actions tab.
  workflow_dispatch:
  # Also run on PRs that touch prompts or the eval itself.
  pull_request:
    paths:
      - 'src/lib/agents/**'
      - 'kb/**'
      - 'qa/persona_eval_v1.yaml'
      - 'scripts/eval.mjs'
      - '.github/workflows/eval.yml'

jobs:
  run-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TIER1_URL: ${{ secrets.TIER1_URL }}
      TIER2_URL: ${{ secrets.TIER2_URL }}
      EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Needed so the eval-runs commit step (below) can push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Verify required secrets
        run: |
          for v in OPENAI_API_KEY TIER1_URL TIER2_URL; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              exit 1
            fi
          done

      - name: Run eval
        id: eval
        run: node scripts/eval.mjs
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: qa/eval-runs/*.md
          retention-days: 90

      - name: Commit report on scheduled runs
        if: github.event_name == 'schedule' && always()
        run: |
          git config user.name "els-eval-bot"
          git config user.email "els-eval-bot@users.noreply.github.com"
          git add qa/eval-runs/*.md || true
          if git diff --cached --quiet; then
            echo "no new eval report to commit"
          else
            git commit -m "eval: weekly run $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Fail the job if the eval failed
        if: steps.eval.outcome != 'success'
        run: |
          echo "::error::Persona eval failed. See the uploaded artifact for the full report."
          exit 1
